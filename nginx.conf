server {
    listen 80;
    server_name domain.com; # your domain

    root /var/www/project/dist; # path to built files
    index index.html;

    location ^~ /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable"; # caches all assets files for 1 year

        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html; # SPA fallback

        add_header Cache-Control "no-cache, no-store, must-revalidate"; # prevents caching
    }
}