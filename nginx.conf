server {
    listen 80;
    server_name your-domain.com; # Ваш домен

    # Указываем путь к папке dist, которую сгенерировал Vite
    root /var/www/your-project/dist; 
    index index.html;

    # ==========================================
    # ПРАВИЛО 1: Бесконечный кэш для файлов с хэшами
    # ==========================================
    # Vite по умолчанию кладет все скомпилированные JS, CSS и картинки в папку /assets/.
    # Мы говорим Nginx: "Всё, что в этой папке, кэшируй на год!"
    location ^~ /assets/ {
        # Кэш на 31536000 секунд (1 год). 
        # Директива immutable говорит браузеру даже не пытаться проверять обновления.
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # Опционально: отключаем запись в лог (чтобы логи не распухали от загрузки скриптов)
        access_log off;
    }

    # ==========================================
    # ПРАВИЛО 2: Никакого кэша для входной точки (HTML)
    # ==========================================
    # Это правило срабатывает для самого index.html и любых других путей
    location / {
        # Стандартный fallback для SPA (React Router и т.д.): 
        # Если файл не найден, отдаем index.html
        try_files $uri $uri/ /index.html;

        # ЖЕЛЕЗОБЕТОННЫЙ ЗАПРЕТ КЭШИРОВАНИЯ
        # Браузер обязан при каждом заходе на сайт спрашивать у сервера свежий HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
}